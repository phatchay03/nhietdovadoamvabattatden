<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IoT Dashboard - Pro Version</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');

        body {
            font-family: 'Inter', sans-serif;
        }

        .text-huge {
            font-size: clamp(4rem, 8vw, 8rem);
            line-height: 1;
        }

        /* Hiệu ứng hào quang màu vàng khi đèn bật */
        .led-glow-on {
            box-shadow: 0 0 35px rgba(245, 158, 11, 0.6);
            border: 2px solid rgba(245, 158, 11, 0.4) !important;
            background-color: #fffbeb !important; /* amber-50 */
        }

        /* Animation nhẹ cho icon khi bật */
        .pulse-yellow {
            animation: pulse-yellow 2s infinite;
        }

        @keyframes pulse-yellow {
            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.1);
            }

            100% {
                transform: scale(1);
            }
        }

        .transition-all-500 {
            transition: all 500ms cubic-bezier(0.4, 0, 0.2, 1);
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen p-4 md:p-10">

    <div class="max-w-6xl mx-auto space-y-10">

        <!-- Header -->
        <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
            <div>
                <h1 class="text-4xl font-black text-slate-900 tracking-tight">Smart Home Console</h1>
                <p class="text-slate-500 font-medium">Hệ thống giám sát và điều khiển thời gian thực</p>
            </div>
            <div id="connection-status" class="px-4 py-2 bg-slate-200 text-slate-600 rounded-full text-sm font-bold flex items-center gap-2 w-fit">
                <div class="w-2 h-2 bg-slate-400 rounded-full animate-pulse"></div>
                Đang kết nối...
            </div>
        </div>

        <!-- Dashboard Grid -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">

            <!-- Card Nhiệt độ -->
            <div class="bg-white border-4 border-slate-100 rounded-[2.5rem] p-8 md:p-12 shadow-xl flex flex-col items-center justify-center transition-all hover:scale-[1.01]">
                <div class="flex items-center gap-4 mb-6">
                    <div class="p-3 bg-orange-50 rounded-2xl">
                        <i data-lucide="thermometer" class="w-8 h-8 text-orange-500" stroke-width="2.5"></i>
                    </div>
                    <span class="text-xl font-black uppercase tracking-widest text-slate-900">Nhiệt độ</span>
                </div>
                <div class="flex items-baseline">
                    <span id="temp-value" class="text-huge font-black tracking-tighter text-slate-900 tabular-nums">--</span>
                    <span class="text-4xl font-bold text-slate-300 ml-3">°C</span>
                </div>
            </div>

            <!-- Card Độ ẩm -->
            <div class="bg-white border-4 border-slate-100 rounded-[2.5rem] p-8 md:p-12 shadow-xl flex flex-col items-center justify-center transition-all hover:scale-[1.01]">
                <div class="flex items-center gap-4 mb-6">
                    <div class="p-3 bg-blue-50 rounded-2xl">
                        <i data-lucide="droplets" class="w-8 h-8 text-blue-500" stroke-width="2.5"></i>
                    </div>
                    <span class="text-xl font-black uppercase tracking-widest text-slate-900">Độ ẩm</span>
                </div>
                <div class="flex items-baseline">
                    <span id="humidity-value" class="text-huge font-black tracking-tighter text-slate-900 tabular-nums">--</span>
                    <span class="text-4xl font-bold text-slate-300 ml-3">%</span>
                </div>
            </div>

            <!-- Card Điều khiển LED -->
            <div class="lg:col-span-2 bg-white border-4 border-slate-100 rounded-[2.5rem] p-8 shadow-xl flex flex-col md:flex-row items-center justify-between gap-8">
                <div class="flex items-center gap-6">
                    <div id="led-icon-bg" class="p-6 bg-slate-100 rounded-[2rem] transition-all-500 border-2 border-transparent">
                        <i id="led-icon" data-lucide="lightbulb-off" class="w-12 h-12 text-slate-400 transition-all-500" stroke-width="2"></i>
                    </div>
                    <div>
                        <h3 class="text-2xl font-black text-slate-900">Hệ thống đèn</h3>
                        <p id="led-status-text" class="text-slate-500 font-bold uppercase tracking-wider transition-all-500">Đang tắt</p>
                    </div>
                </div>

                <div class="flex gap-4 w-full md:w-auto">
                    <button id="btn-on" class="flex-1 md:flex-none px-10 py-5 bg-slate-900 text-white rounded-2xl font-black text-lg hover:bg-amber-500 transition-all active:scale-95">
                        BẬT ĐÈN
                    </button>
                    <button id="btn-off" class="flex-1 md:flex-none px-10 py-5 bg-white border-4 border-slate-100 text-slate-400 rounded-2xl font-black text-lg hover:border-red-100 hover:text-red-500 transition-all active:scale-95">
                        TẮT
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://www.unpkg.com/@eohjsc/era-widget@1.1.3/src/index.js"></script>
    <script>
        lucide.createIcons();

        const tempElement = document.getElementById('temp-value');
        const humiElement = document.getElementById('humidity-value');
        const ledStatusText = document.getElementById('led-status-text');
        const ledIconContainer = document.getElementById('led-icon-bg');
        const connectionStatus = document.getElementById('connection-status');

        const btnOn = document.getElementById('btn-on');
        const btnOff = document.getElementById('btn-off');

        let configTemp, configHumi, configLed, actions;

        const eraWidget = new EraWidget();
        eraWidget.init({
            needRealtimeConfigs: true,
            needActions: true,
            maxRealtimeConfigsCount: 3,
            maxActionsCount: 2,

            onConfiguration: (configuration) => {
                configTemp = configuration.realtime_configs[0];
                configHumi = configuration.realtime_configs[1];
                configLed = configuration.realtime_configs[2];
                actions = configuration.actions;

                connectionStatus.innerHTML = '<div class="w-2 h-2 bg-emerald-500 rounded-full"></div> Đã kết nối';
                connectionStatus.className = 'px-4 py-2 bg-emerald-50 text-emerald-600 rounded-full text-sm font-bold flex items-center gap-2 w-fit';
            },

            onValues: (values) => {
                if (configTemp && values[configTemp.id]) {
                    tempElement.innerText = values[configTemp.id].value;
                }
                if (configHumi && values[configHumi.id]) {
                    humiElement.innerText = values[configHumi.id].value;
                }

                if (configLed && values[configLed.id]) {
                    const rawVal = values[configLed.id].value;
                    const isOn = (rawVal == 1 || rawVal === "1" || rawVal === true || String(rawVal).toLowerCase() === 'on');
                    updateLedUI(isOn);
                }
            }
        });

        function updateLedUI(isOn) {
            // Lấy lại icon hiện tại
            const currentIcon = document.getElementById('led-icon');

            if (isOn) {
                ledStatusText.innerText = 'Đang bật';
                ledStatusText.className = 'text-amber-500 font-bold uppercase tracking-wider transition-all-500';

                // Thay thế bằng icon sáng (không gạch)
                if (currentIcon) {
                    currentIcon.outerHTML = '<i id="led-icon" data-lucide="lightbulb" class="w-12 h-12 text-amber-500 transition-all-500 pulse-yellow" stroke-width="2"></i>';
                }

                ledIconContainer.className = 'p-6 bg-amber-50 rounded-[2rem] transition-all-500 led-glow-on';
            } else {
                ledStatusText.innerText = 'Đang tắt';
                ledStatusText.className = 'text-slate-500 font-bold uppercase tracking-wider transition-all-500';

                // Thay thế bằng icon tắt (có gạch)
                if (currentIcon) {
                    currentIcon.outerHTML = '<i id="led-icon" data-lucide="lightbulb-off" class="w-12 h-12 text-slate-400 transition-all-500" stroke-width="2"></i>';
                }

                ledIconContainer.className = 'p-6 bg-slate-100 rounded-[2rem] transition-all-500 border-2 border-transparent';
            }

            // Yêu cầu Lucide vẽ lại icon mới chèn vào
            lucide.createIcons();
        }

        btnOn.addEventListener('click', () => {
            updateLedUI(true);
            if (actions && actions[0]) {
                eraWidget.triggerAction(actions[0].action, null);
            }
        });

        btnOff.addEventListener('click', () => {
            // Ép buộc giao diện về trạng thái tắt ngay lập tức
            updateLedUI(false);
            if (actions && actions[1]) {
                eraWidget.triggerAction(actions[1].action, null);
            }
        });
    </script>
</body>
</html>
