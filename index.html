<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IoT Dashboard - Smart Home Control</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');

        body {
            font-family: 'Inter', sans-serif;
        }

        .text-huge {
            font-size: clamp(4rem, 10vw, 8rem);
            line-height: 1;
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-6">

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 w-full max-w-7xl">

        <!-- Card Nhiệt độ -->
        <div class="bg-white border-4 border-slate-100 rounded-[3rem] p-10 shadow-xl flex flex-col items-center justify-center transition-all duration-300 hover:border-slate-200">
            <div class="flex items-center gap-4 mb-6">
                <div class="p-3 bg-orange-50 rounded-2xl">
                    <i data-lucide="thermometer" class="w-8 h-8 text-orange-500" stroke-width="2.5"></i>
                </div>
                <span class="text-xl font-black uppercase tracking-widest text-slate-400">Nhiệt độ</span>
            </div>
            <div class="flex items-baseline">
                <span id="temp-value" class="text-huge font-black tracking-tighter text-slate-900 tabular-nums">--</span>
                <span class="text-4xl font-bold text-slate-300 ml-2">°C</span>
            </div>
        </div>

        <!-- Card Độ ẩm -->
        <div class="bg-white border-4 border-slate-100 rounded-[3rem] p-10 shadow-xl flex flex-col items-center justify-center transition-all duration-300 hover:border-slate-200">
            <div class="flex items-center gap-4 mb-6">
                <div class="p-3 bg-blue-50 rounded-2xl">
                    <i data-lucide="droplets" class="w-8 h-8 text-blue-500" stroke-width="2.5"></i>
                </div>
                <span class="text-xl font-black uppercase tracking-widest text-slate-400">Độ ẩm</span>
            </div>
            <div class="flex items-baseline">
                <span id="humidity-value" class="text-huge font-black tracking-tighter text-slate-900 tabular-nums">--</span>
                <span class="text-4xl font-bold text-slate-300 ml-2">%</span>
            </div>
        </div>

        <!-- Card Điều khiển Đèn -->
        <div id="light-card" class="bg-white border-4 border-slate-100 rounded-[3rem] p-10 shadow-xl flex flex-col items-center justify-center transition-all duration-300 hover:border-slate-200">
            <div class="flex items-center gap-4 mb-8">
                <div id="light-icon-bg" class="p-3 bg-slate-50 rounded-2xl transition-colors duration-500">
                    <i id="light-icon" data-lucide="lightbulb" class="w-8 h-8 text-slate-400 transition-colors duration-500" stroke-width="2.5"></i>
                </div>
                <span class="text-xl font-black uppercase tracking-widest text-slate-400">Đèn Phòng</span>
            </div>

            <!-- Nút bấm được bọc trong div để tối ưu vùng chạm -->
            <button id="btn-light" class="relative inline-flex items-center h-20 rounded-full w-40 px-2 transition-all duration-300 focus:outline-none bg-slate-200 cursor-pointer active:scale-95">
                <span id="btn-slider" class="inline-block w-16 h-16 transform bg-white rounded-full transition-transform duration-500 translate-x-0 shadow-lg pointer-events-none"></span>
                <span id="btn-text" class="absolute right-6 font-black text-slate-400 uppercase tracking-tight text-sm pointer-events-none">OFF</span>
            </button>

            <p id="light-status-text" class="mt-6 text-slate-400 font-bold uppercase text-xs tracking-[0.2em]">Đang chờ kết nối...</p>
        </div>

    </div>

    <!-- Tải thư viện Era Widget -->
    <script src="https://www.unpkg.com/@eohjsc/era-widget@1.1.3/src/index.js"></script>
    <script>
        lucide.createIcons();

        const tempElement = document.getElementById('temp-value');
        const humiElement = document.getElementById('humidity-value');
        const btnLight = document.getElementById('btn-light');
        const btnSlider = document.getElementById('btn-slider');
        const btnText = document.getElementById('btn-text');
        const lightIcon = document.getElementById('light-icon');
        const lightIconBg = document.getElementById('light-icon-bg');
        const statusText = document.getElementById('light-status-text');

        let configTemp, configHumi, configLight;
        let currentLightValue = 0;

        const eraWidget = new EraWidget();
        eraWidget.init({
            needRealtimeConfigs: true,
            maxRealtimeConfigsCount: 3,

            onConfiguration: (configuration) => {
                console.log("Cấu hình nhận được:", configuration);
                configTemp = configuration.realtime_configs[0];
                configHumi = configuration.realtime_configs[1];
                configLight = configuration.realtime_configs[2];

                if (configLight) {
                    statusText.innerText = "Sẵn sàng điều khiển";
                    btnLight.classList.remove('opacity-50', 'cursor-not-allowed');
                } else {
                    statusText.innerText = "Lỗi: Chưa cấu hình chân đèn";
                    btnLight.classList.add('opacity-50', 'cursor-not-allowed');
                }
            },

            onValues: (values) => {
                console.log("Giá trị mới:", values);

                if (configTemp && values[configTemp.id]) {
                    tempElement.innerText = values[configTemp.id].value;
                }

                if (configHumi && values[configHumi.id]) {
                    humiElement.innerText = values[configHumi.id].value;
                }

                if (configLight && values[configLight.id]) {
                    // Ép kiểu về Number để tránh lỗi so sánh chuỗi
                    const value = Number(values[configLight.id].value);
                    currentLightValue = value;
                    updateLightUI(value);
                }
            }
        });

        function updateLightUI(isOn) {
            if (isOn === 1) {
                btnLight.classList.replace('bg-slate-200', 'bg-orange-400');
                btnSlider.style.transform = 'translateX(80px)';
                btnText.innerText = "ON";
                btnText.classList.replace('right-6', 'left-6');
                btnText.classList.replace('text-slate-400', 'text-white');

                lightIcon.classList.replace('text-slate-400', 'text-orange-500');
                lightIconBg.classList.replace('bg-slate-50', 'bg-orange-100');
                statusText.innerText = "Đèn đang bật";
                statusText.classList.add('text-orange-500');
            } else {
                btnLight.classList.replace('bg-orange-400', 'bg-slate-200');
                btnSlider.style.transform = 'translateX(0px)';
                btnText.innerText = "OFF";
                btnText.classList.replace('left-6', 'right-6');
                btnText.classList.replace('text-white', 'text-slate-400');

                lightIcon.classList.replace('text-orange-500', 'text-slate-400');
                lightIconBg.classList.replace('bg-orange-100', 'bg-slate-50');
                statusText.innerText = "Đèn đang tắt";
                statusText.classList.remove('text-orange-500');
            }
        }

        btnLight.addEventListener('click', () => {
            if (!configLight) {
                console.error("Chưa có cấu hình cho đèn!");
                return;
            }

            // Đảo trạng thái
            const newValue = currentLightValue === 1 ? 0 : 1;
            console.log("Gửi lệnh điều khiển:", newValue);

            // Gửi action đến ID chính xác của đèn
            eraWidget.triggerAction(configLight.id, newValue);

            // Cập nhật giao diện ngay lập tức để người dùng thấy phản hồi
            currentLightValue = newValue;
            updateLightUI(newValue);
        });
    </script>
</body>
</html>
